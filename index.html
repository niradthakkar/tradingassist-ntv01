<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0f1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="TradingAssist">
<link rel="manifest" href="/manifest.json">
<title>TradingAssist-NTv0.1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1c;--bg2:#111827;--bg3:#1a2236;--bg4:#212d42;--border:#1e2d45;--border2:#253550;--text:#dce6f0;--text2:#7a96b8;--text3:#3d5470;--accent:#3b82f6;--accent2:#93c5fd;--green:#22c55e;--green2:#4ade80;--gbg:rgba(34,197,94,.08);--red:#ef4444;--red2:#f87171;--rbg:rgba(239,68,68,.08);--amber:#f59e0b;--abg:rgba(245,158,11,.08);--purple:#a78bfa;--pbg:rgba(167,139,250,.08);--r:10px;--rs:6px;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.app{max-width:1400px;margin:0 auto;padding:16px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-name{font-size:16px;font-weight:600}.logo-ver{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.hdr-r{display:flex;align-items:center;gap:8px}
.live{display:flex;align-items:center;gap:5px;background:var(--gbg);color:var(--green);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:6px 14px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg4);color:var(--text)}.btn.loading{opacity:.6;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
.nav{display:flex;gap:2px;margin-bottom:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:3px;overflow-x:auto}
.ntab{padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);white-space:nowrap;transition:all .15s;border:none;background:transparent;font-family:'Inter',sans-serif}
.ntab.active{background:var(--accent);color:#fff}.ntab:hover:not(.active){color:var(--text);background:var(--bg3)}
.sec{display:none}.sec.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:12px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.clbl{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.cval{font-size:19px;font-weight:500;color:var(--text)}.cval.up{color:var(--green)}.cval.dn{color:var(--red)}.cval.ac{color:var(--accent2)}.cval.pu{color:var(--purple)}.cval.am{color:var(--amber)}
.csub{font-size:11px;color:var(--text3);margin-top:3px}
.shdr{display:flex;align-items:center;justify-content:space-between;margin:16px 0 10px}
.stitle{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-weight:500}
.b-isa{background:var(--pbg);color:var(--purple)}.b-inv{background:var(--abg);color:var(--amber)}.b-wat{background:var(--gbg);color:var(--green)}.b-own{background:rgba(59,130,246,.1);color:var(--accent2)}
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:860px}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:500;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg3);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(255,255,255,.015)}
.tick{font-weight:500;font-family:'JetBrains Mono',monospace;font-size:12px}
.sname{font-size:10px;color:var(--text2);margin-top:1px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stag{font-size:10px;color:var(--text3);background:var(--bg3);padding:1px 5px;border-radius:3px;display:inline-block;margin-top:2px}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px}.up{color:var(--green)}.dn{color:var(--red)}.nt{color:var(--text2)}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500;white-space:nowrap}
.p-sb{background:rgba(34,197,94,.15);color:var(--green2)}.p-b{background:rgba(34,197,94,.08);color:var(--green)}.p-n{background:var(--bg3);color:var(--text2)}.p-br{background:rgba(239,68,68,.08);color:var(--red)}.p-sbr{background:rgba(239,68,68,.15);color:var(--red2)}.p-ld{background:var(--bg3);color:var(--text3);font-style:italic}
.ibox{display:flex;gap:3px;flex-wrap:wrap}
.itag{font-size:10px;padding:2px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;white-space:nowrap;background:var(--bg3);color:var(--text2)}
.itag.ob{background:var(--rbg);color:var(--red2)}.itag.os{background:var(--gbg);color:var(--green2)}.itag.mb{background:var(--gbg);color:var(--green)}.itag.mr{background:var(--rbg);color:var(--red)}.itag.gc{background:var(--gbg);color:var(--green)}.itag.dc{background:var(--rbg);color:var(--red)}
.nhl{font-size:11px;color:var(--text2);max-width:175px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}.nhl:hover{color:var(--accent2)}
.nmore{background:none;border:none;color:var(--accent);font-size:10px;cursor:pointer;padding:1px 4px;border-radius:3px;display:block;margin-top:2px}
.nld{font-size:10px;color:var(--text3);font-style:italic}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;padding:16px}.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);max-width:580px;width:100%;max-height:80vh;overflow-y:auto}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2)}
.mhdr h3{font-size:13px;font-weight:500}
.mcls{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:4px}.mcls:hover{background:var(--bg3)}
.mbody{padding:13px 18px}
.nc{padding:11px;border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px;background:var(--bg3)}
.nc-t{font-size:12px;font-weight:500;margin-bottom:3px;line-height:1.4}.nc-m{font-size:10px;color:var(--text3);margin-bottom:5px;font-family:'JetBrains Mono',monospace}.nc-s{font-size:11px;color:var(--text2);line-height:1.5}.nc-l{font-size:10px;color:var(--accent);text-decoration:none;display:inline-block;margin-top:4px}
.wladd{display:flex;gap:8px;margin-bottom:12px}
.wlinput{flex:1;background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:var(--rs);font-size:12px;font-family:'Inter',sans-serif;outline:none}.wlinput:focus{border-color:var(--accent)}.wlinput::placeholder{color:var(--text3)}
.addbtn{background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif}.addbtn:hover{background:#2563eb}
.rmbtn{background:none;border:none;color:var(--red);font-size:11px;cursor:pointer;padding:3px 7px;border-radius:3px}.rmbtn:hover{background:var(--rbg)}
.tftabs,.news-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tftab,.news-tab{padding:5px 13px;border-radius:var(--rs);font-size:11px;font-weight:500;cursor:pointer;background:var(--bg3);color:var(--text2);border:1px solid var(--border);transition:all .15s;font-family:'Inter',sans-serif}.tftab.active,.news-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:10px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;transition:border-color .15s}.scard:hover{border-color:var(--border2)}
.stop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.stick{font-size:17px;font-weight:600;font-family:'JetBrains Mono',monospace}.sco{font-size:11px;color:var(--text2);margin-top:2px}
.risk{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}.rl{background:var(--gbg);color:var(--green2)}.rm{background:var(--abg);color:var(--amber)}.rh{background:var(--rbg);color:var(--red2)}.rvh{background:rgba(239,68,68,.2);color:#fca5a5}
.stgts{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin:10px 0}
.tgt{background:var(--bg3);border-radius:var(--rs);padding:6px 4px;text-align:center}.tgtl{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:2px}.tgtv{font-size:12px;font-weight:500;color:var(--green)}
.sreason{font-size:11px;color:var(--text2);line-height:1.45;margin-bottom:6px}.ssec{font-size:10px;color:var(--text3)}
.ldg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;gap:10px}
.sp{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.ldg p{font-size:12px;color:var(--text3)}
.err{background:var(--rbg);border:1px solid rgba(239,68,68,.2);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--red2);margin-bottom:12px}
.notice{background:var(--abg);border:1px solid rgba(245,158,11,.2);border-radius:var(--rs);padding:9px 12px;font-size:11px;color:var(--amber);margin-top:12px}
.ind-loading{font-size:10px;color:var(--text3);font-style:italic}
.filter-bar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.fi{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:var(--rs);font-size:11px;outline:none;font-family:'Inter',sans-serif}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.news-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;transition:border-color .15s}.news-item:hover{border-color:var(--border2)}
.news-item-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.news-sent{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.sent-bull{background:rgba(34,197,94,.1);color:var(--green)}.sent-bear{background:rgba(239,68,68,.1);color:var(--red)}.sent-neut{background:var(--bg3);color:var(--text2)}.sent-crit{background:rgba(245,158,11,.15);color:var(--amber)}
.news-source{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}.news-date{font-size:10px;color:var(--text3);margin-left:auto}
.news-headline{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:6px}
.news-summary{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.news-link{font-size:10px;color:var(--accent);text-decoration:none}
.news-ticker{font-size:10px;padding:1px 5px;background:var(--pbg);color:var(--purple);border-radius:3px;font-family:'JetBrains Mono',monospace}
.crit-banner{background:var(--abg);border:1px solid rgba(245,158,11,.3);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--amber)}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center;padding:16px}.detail-overlay.open{display:flex}
.detail-modal{background:#111827;border:1px solid #253550;border-radius:12px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto}
.detail-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #1e2d45;position:sticky;top:0;background:#111827;z-index:1}
.detail-sym{font-size:20px;font-weight:600;font-family:'JetBrains Mono',monospace}.detail-name{font-size:12px;color:#7a96b8;margin-top:2px}
.detail-body{padding:16px 20px}
.detail-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.detail-card{background:#1a2236;border:1px solid #1e2d45;border-radius:8px;padding:10px 12px}
.chart-wrap{background:#1a2236;border:1px solid #1e2d45;border-radius:8px;padding:12px;margin-bottom:16px}
.chart-title{font-size:11px;color:#7a96b8;margin-bottom:8px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.ind-detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.ind-detail-card{background:#1a2236;border:1px solid #1e2d45;border-radius:8px;padding:10px 12px}
.ind-label{font-size:10px;color:#7a96b8;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.ind-value{font-size:14px;font-weight:500}.ind-desc{font-size:10px;color:#3d5470;margin-top:2px}
.heatmap-wrap{margin-bottom:16px}
.heatmap-grid{display:flex;flex-wrap:wrap;gap:3px;background:#0b0f1c;border:1px solid #1e2d45;border-radius:10px;padding:10px}
.hmap-cell{border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity .15s;min-width:60px;min-height:60px;padding:4px;text-align:center}.hmap-cell:hover{opacity:.85}
.hmap-tick{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;color:#fff;line-height:1.2}
.hmap-ppl{font-size:9px;color:rgba(255,255,255,.8);margin-top:2px}.hmap-val{font-size:9px;color:rgba(255,255,255,.7)}
@media(max-width:640px){.hdr{flex-direction:column;gap:8px;align-items:flex-start}.cards{grid-template-columns:repeat(2,1fr)}.sgrid{grid-template-columns:1fr}table{min-width:700px}}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="logo">
    <div class="logo-icon">&#128200;</div>
    <div><div class="logo-name">TradingAssist</div><div class="logo-ver">NT v0.1 &middot; GBP</div></div>
  </div>
  <div class="hdr-r">
    <div class="live"><div class="dot"></div>LIVE</div>
    <span id="last-updated" style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace"></span>
    <button class="btn" id="ref-btn" onclick="refreshAll()"><span id="ref-ico">R</span> Refresh</button>
  </div>
</div>
<div class="nav">
  <button class="ntab active" onclick="showTab('overview',this)">Overview</button>
  <button class="ntab" onclick="showTab('isa',this)">ISA Portfolio</button>
  <button class="ntab" onclick="showTab('invest',this)">Invest Portfolio</button>
  <button class="ntab" onclick="showTab('watchlist',this)">Watchlist</button>
  <button class="ntab" onclick="showTab('suggestions',this)">AI Suggestions</button>
  <button class="ntab" onclick="showTab('news',this)">News</button>
  <button class="ntab" onclick="showTab('earnings',this)">Earnings</button>
</div>
<div id="sec-overview" class="sec active"><div id="ov-c"><div class="ldg"><div class="sp"></div><p>Loading portfolio...</p></div></div></div>
<div id="sec-isa" class="sec"><div id="isa-c"><div class="ldg"><div class="sp"></div><p>Loading ISA...</p></div></div></div>
<div id="sec-invest" class="sec"><div id="inv-c"><div class="ldg"><div class="sp"></div><p>Loading Invest...</p></div></div></div>
<div id="sec-watchlist" class="sec">
  <div class="wladd"><input class="wlinput" id="wl-inp" placeholder="Add ticker e.g. NVDA" onkeydown="if(event.key==='Enter')addWL()"/><button class="addbtn" onclick="addWL()">+ Add</button></div>
  <div id="wl-c"><div class="ldg"><div class="sp"></div><p>Loading watchlist...</p></div></div>
</div>
<div id="sec-suggestions" class="sec">
  <div class="tftabs">
    <button class="tftab active" onclick="showSug('1day',this)">1 Day</button>
    <button class="tftab" onclick="showSug('1week',this)">1 Week</button>
    <button class="tftab" onclick="showSug('1month',this)">1 Month</button>
    <button class="tftab" onclick="showSug('1year',this)">1 Year</button>
  </div>
  <div id="sug-c"><div class="ldg"><div class="sp"></div><p>Loading...</p></div></div>
</div>
<div id="sec-news" class="sec"><div id="news-c"><div class="ldg"><div class="sp"></div><p>Loading news...</p></div></div></div>
<div id="sec-earnings" class="sec"><div id="earn-c"><div class="ldg"><div class="sp"></div><p>Loading earnings...</p></div></div></div>
</div>
<div class="overlay" id="modal">
  <div class="modal"><div class="mhdr"><h3 id="m-title">News</h3><button class="mcls" onclick="closeModal()">X</button></div><div class="mbody" id="m-body"></div></div>
</div>
<div class="detail-overlay" id="detail-modal">
  <div class="detail-modal">
    <div class="detail-hdr"><div><div class="detail-sym" id="detail-sym">-</div><div class="detail-name" id="detail-name">Loading...</div></div><button class="mcls" onclick="closeDetail()">X</button></div>
    <div class="detail-body" id="detail-body"><div class="ldg"><div class="sp"></div><p>Loading...</p></div></div>
  </div>
</div>
<script>
var S={summary:null,isa:[],invest:[],watchlist:[],suggestions:{},earnings:{},extraWL:JSON.parse(localStorage.getItem('extraWL')||'[]'),removedWL:JSON.parse(localStorage.getItem('removedWL')||'[]'),indCache:JSON.parse(sessionStorage.getItem('indCache')||'{}'),newsCache:JSON.parse(sessionStorage.getItem('newsCache')||'{}'),sugTF:'1day'};
var owned={};
var NF={'NVDA':'NVIDIA Corp','AMD':'Advanced Micro Devices','TSLA':'Tesla Inc','AAPL':'Apple Inc','MSFT':'Microsoft Corp','GOOGL':'Alphabet Inc','AMZN':'Amazon.com Inc','META':'Meta Platforms','PLTR':'Palantir Technologies','SOFI':'SoFi Technologies','CRWD':'CrowdStrike Holdings','COIN':'Coinbase Global','HOOD':'Robinhood Markets','MSTR':'MicroStrategy Inc','SMCI':'Super Micro Computer','SNOW':'Snowflake Inc','SHOP':'Shopify Inc','UBER':'Uber Technologies','RBLX':'Roblox Corp','RIVN':'Rivian Automotive','HIMS':'Hims and Hers Health','SQ':'Block Inc','V':'Visa Inc','JPM':'JPMorgan Chase','LLY':'Eli Lilly','ABBV':'AbbVie Inc','COST':'Costco Wholesale','UNH':'UnitedHealth Group','IONQ':'IonQ Inc','RXRX':'Recursion Pharma','ALAB':'Astera Labs','RKLB':'Rocket Lab USA','DDOG':'Datadog Inc','NET':'Cloudflare Inc','PATH':'UiPath Inc','LUNR':'Intuitive Machines','ACHR':'Archer Aviation','ARKG':'ARK Genomic Revolution ETF','BITF':'Keel Infrastructure','RIOT':'Riot Platforms','SOUN':'SoundHound AI','QUBT':'Quantum Computing','INTC':'Intel Corp','QCOM':'Qualcomm Inc','AVGO':'Broadcom Inc','TSM':'Taiwan Semiconductor','SOXL':'Direxion Semi Bull 3X','SEMI':'iShares Semiconductor ETF','EQQQ':'Invesco EQQQ Nasdaq','HOD':'WisdomTree Crude Oil 2X','MU':'Micron Technology','RR':'Rolls-Royce Holdings','XE':'Xcel Energy','APLD':'Applied Digital Corp','ASST':'Asset Entities Inc','APP':'AppLovin Corp','BULL':'Direxion Bull 3X','ARM3':'Arm Holdings','GIG':'GigCapital4','DMYI':'dMY Technology','SNII':'Spinnaker Nations II','IPOE':'Social Capital Hedosophia','ALCC1':'AleAnna Inc','XPOA':'XPO Inc','KCAC':'Kensington Capital','PLT':'Palantir ETF','BRK.B':'Berkshire Hathaway B'};
var NC={};try{NC=JSON.parse(sessionStorage.getItem('nameCache')||'{}');}catch(e){}
Object.keys(NF).forEach(function(k){if(!NC[k])NC[k]=NF[k];});
function f(n,d){d=d||2;return n!=null?Number(n).toLocaleString('en-GB',{minimumFractionDigits:d,maximumFractionDigits:d}):'-';}
function gbp(n){return n!=null?'£'+f(n):'-';}
function usd(n){return n!=null?'$'+f(n):'-';}
function cls(n){return n>0?'up':n<0?'dn':'nt';}

    })()+
    '<td class="mono">'+price(h.averagePrice)+'</td><td class="mono">'+price(h.currentPrice)+(h.underlyingSymbol&&h.underlyingPrice?'<div style="font-size:9px;color:var(--accent2);margin-top:1px">('+h.underlyingSymbol+': $'+f2(h.underlyingPrice)+')</div>':'')+'</td><td class="mono" style="font-weight:500">'+price((h.currentPrice||0)*(h.quantity||0))+'</td><td class="mono '+cls(h.ppl)+'" style="font-weight:500">'+(h.ppl!=null?(h.ppl>=0?'+':'')+gbp(h.ppl):'-')+'</td><td class="sig-cell">'+(hasInd?signalPill(ind.signal||'Neutral'):'<span class="pill p-ld">loading</span>')+'</td><td class="ind-cell"><div class="ibox">'+(hasInd?renderInds(ind):'<span class="ind-loading">loading</span>')+'</div></td><td class="news-cell">'+(news!==undefined?renderNewsInline(news,sym):'<span class="nld">loading</span>')+'</td></tr>';}
function acctCard(title,badge,data,vc){var inv=((data||{}).investments||{});return '<div class="card"><div style="display:flex;align-items:center;gap:7px;margin-bottom:11px"><span style="font-size:13px;font-weight:500">'+title+'</span><span class="badge '+badge+'">'+title.split(' ')[0].toUpperCase()+'</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><div class="clbl">Value</div><div class="cval '+vc+'" style="font-size:15px">'+gbp((data||{}).totalValue)+'</div></div><div><div class="clbl">Cash</div><div class="cval" style="font-size:15px">'+gbp(((data||{}).cash||{}).availableToTrade)+'</div></div><div><div class="clbl">Unrealised</div><div class="cval '+cls(inv.unrealizedProfitLoss)+'" style="font-size:15px">'+gbp(inv.unrealizedProfitLoss)+'</div></div><div><div class="clbl">Realised</div><div class="cval '+cls(inv.realizedProfitLoss)+'" style="font-size:15px">'+gbp(inv.realizedProfitLoss)+'</div></div></div></div>';}
function renderOverview(){var c=((S.summary||{}).combined)||{};var bullC=0,bearC=0;S.isa.concat(S.invest).forEach(function(h){var sig=(S.indCache[h.symbol]||{}).signal||'';if(sig.indexOf('Bullish')>=0) bullC++;if(sig.indexOf('Bearish')>=0) bearC++;});document.getElementById('ov-c').innerHTML='<div class="cards"><div class="card"><div class="clbl">Combined Value</div><div class="cval ac">'+gbp(c.totalValue)+'</div><div class="csub">Both accounts</div></div><div class="card"><div class="clbl">Available Cash</div><div class="cval">'+gbp(c.availableCash)+'</div><div class="csub">Ready to invest</div></div><div class="card"><div class="clbl">Unrealised P&amp;L</div><div class="cval '+cls(c.unrealizedPnL)+'">'+gbp(c.unrealizedPnL)+'</div><div class="csub">Combined</div></div><div class="card"><div class="clbl">Realised P&amp;L</div><div class="cval '+cls(c.realizedPnL)+'">'+gbp(c.realizedPnL)+'</div><div class="csub">Combined</div></div><div class="card"><div class="clbl">Holdings</div><div class="cval ac">'+(S.isa.length+S.invest.length)+'</div><div class="csub">ISA + Invest</div></div><div class="card"><div class="clbl">Signals</div><div class="cval"><span class="up">'+bullC+'</span> / <span class="dn">'+bearC+'</span></div><div class="csub">loading</div></div></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:10px;margin-bottom:12px">'+acctCard('ISA Account','b-isa',((S.summary||{}).isa)||{},'pu')+acctCard('Invest Account','b-inv',((S.summary||{}).invest)||{},'am')+'</div><div class="shdr"><div class="stitle">Top Holdings</div></div>'+holdingsTable(S.isa.slice(0,5).concat(S.invest.slice(0,5)),true,'tbl-ov')+'<div class="shdr"><div class="stitle">ISA Heatmap <span style="font-size:11px;color:var(--text3);font-weight:400">- click stock for details</span></div></div><div class="heatmap-wrap">'+renderHeatmap(S.isa)+'</div><div class="shdr"><div class="stitle">Invest Heatmap</div></div><div class="heatmap-wrap">'+renderHeatmap(S.invest)+'</div>';}
function renderPortfolio(acct,holdings,name,badge,vc){var d=acct==='isa'?((S.summary||{}).isa):((S.summary||{}).invest);var inv=((d||{}).investments||{});var cid=acct==='isa'?'isa-c':'inv-c',tid=acct==='isa'?'tbl-isa':'tbl-inv';document.getElementById(cid).innerHTML='<div class="shdr"><div class="stitle">'+(name==='ISA'?'Stocks ISA':'General Invest')+' Portfolio <span class="badge '+badge+'">'+name.toUpperCase()+'</span></div></div><div class="cards"><div class="card"><div class="clbl">Total Value</div><div class="cval '+vc+'">'+gbp((d||{}).totalValue)+'</div></div><div class="card"><div class="clbl">Cash</div><div class="cval">'+gbp(((d||{}).cash||{}).availableToTrade)+'</div></div><div class="card"><div class="clbl">Invested</div><div class="cval ac">'+gbp(inv.currentValue)+'</div></div><div class="card"><div class="clbl">Unrealised P&amp;L</div><div class="cval '+cls(inv.unrealizedProfitLoss)+'">'+gbp(inv.unrealizedProfitLoss)+'</div></div><div class="card"><div class="clbl">Realised P&amp;L</div><div class="cval '+cls(inv.realizedProfitLoss)+'">'+gbp(inv.realizedProfitLoss)+'</div></div><div class="card"><div class="clbl">Holdings</div><div class="cval">'+holdings.length+'</div></div></div><div class="shdr"><div class="stitle">'+holdings.length+' Holdings</div></div>'+holdingsTable(holdings,false,tid);}
function renderWatchlist(){var removed={};S.removedWL.forEach(function(t){removed[t]=1;});var items=S.watchlist.filter(function(h){return !removed[h.ticker];});S.extraWL.forEach(function(t){var found=items.some(function(h){return h.symbol===t||h.ticker===t;});if(!found) items.push({ticker:t,symbol:t,sector:'Manual',portfolioValue:0,ppl:null,account:'Manual',currency:'USD',quantity:0,averagePrice:0,currentPrice:0});});var rows=items.map(function(h){var sym=h.symbol||h.ticker||'';var ind=S.indCache[sym]||{},news=S.newsCache[sym],hasInd=Object.keys(ind).length>0;var price=h.currency==='USD'?usd:gbp;return '<tr data-symbol="'+sym+'"><td><div><div class="tick">'+sym+'</div><div class="sname">'+esc(NC[sym]||h.name||'')+'</div><div class="stag">'+(h.sector||'Other')+'</div></div></td><td><span class="badge '+(h.account==='ISA'?'b-isa':h.account==='Invest'?'b-inv':'b-wat')+'">'+(h.account||'Manual')+'</span></td><td class="mono">'+price((h.currentPrice||0)*(h.quantity||0))+'</td><td class="mono '+cls(h.ppl)+'">'+(h.ppl!=null?(h.ppl>=0?'+':'')+gbp(h.ppl):'-')+'</td><td class="sig-cell">'+(hasInd?signalPill(ind.signal||'Neutral'):'<span class="pill p-ld">loading</span>')+'</td><td class="ind-cell"><div class="ibox">'+(hasInd?renderInds(ind):'<span class="ind-loading">loading</span>')+'</div></td><td class="news-cell">'+(news!==undefined?renderNewsInline(news,sym):'<span class="nld">loading</span>')+'</td><td><button class="rmbtn" onclick="removeWL(\''+h.ticker+'\')">X</button></td></tr>';}).join('');document.getElementById('wl-c').innerHTML='<div class="shdr"><div class="stitle">Watchlist <span class="badge b-wat">WATCH</span></div><div style="font-size:11px;color:var(--text3)">'+items.length+' stocks</div></div><div class="tw"><table><thead><tr><th>Ticker</th><th>Account</th><th>Total Holding</th><th>P&amp;L GBP</th><th>Signal</th><th>Indicators</th><th>News</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';var toFetch=items.map(function(h){return h.symbol||h.ticker;}).filter(function(s){return s&&!S.indCache[s];});if(toFetch.length) queueFetch(toFetch);items.forEach(function(h){fetchName(h.symbol||h.ticker);});}
function renderSuggestions(tf){S.sugTF=tf;var items=S.suggestions[tf]||[];function perf(s){if(!s.perf) return '';return '<div style="margin-bottom:8px"><div style="font-size:9px;color:var(--text3);font-family:JetBrains Mono,monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Past Performance</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">'+['1d','2d','1w','1m'].map(function(k){var v=s.perf[k];var c=v>0?'var(--green)':v<0?'var(--red)':'var(--text3)';var sign=v>=0?'+':'';return '<div style="background:var(--bg3);border-radius:4px;padding:5px 4px;text-align:center"><div style="font-size:9px;color:var(--text3);margin-bottom:2px">'+k.toUpperCase()+'</div><div style="font-size:11px;font-weight:500;color:'+c+'">'+sign+v.toFixed(1)+'%</div></div>';}).join('')+'</div></div>';}document.getElementById('sug-c').innerHTML='<div class="sgrid">'+items.map(function(s){return '<div class="scard"><div class="stop"><div><div class="stick">'+s.ticker+'</div><div class="sco">'+s.company+'</div></div><div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">'+riskBadge(s.risk)+(owned[s.ticker]?'<span class="badge b-own">Owned</span>':'')+'</div></div>'+perf(s)+'<div><div style="font-size:9px;color:var(--text3);font-family:JetBrains Mono,monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Target Forecast</div><div class="stgts">'+['1d','2d','1w','1m','1y'].map(function(k){return '<div class="tgt"><div class="tgtl">'+k.toUpperCase()+'</div><div class="tgtv">+'+s.targets[k]+'%</div></div>';}).join('')+'</div></div><div class="sreason">'+s.reason+'</div><div class="ssec">'+s.sector+'</div></div>';}).join('')+(items.length===0?'<div style="color:var(--text3);font-size:12px;padding:16px">No suggestions</div>':'')+'</div><div class="notice">AI suggestions are for informational purposes only. Not financial advice.</div>';}
function renderEarnings(tab){
  tab=tab||'upcoming';
  var data=S.earnings||{};
  var allItems=(tab==='upcoming'?data.upcoming:data.past)||[];

  function verdictStyle(v){
    if(!v) return 'color:var(--text3)';
    if(v==='Exceeded') return 'color:var(--green);font-weight:500';
    if(v==='Met Expectations') return 'color:var(--accent2);font-weight:500';
    return 'color:var(--red);font-weight:500';
  }
  function verdictIcon(v){
    if(!v) return '';
    if(v==='Exceeded') return ' +';
    if(v==='Met Expectations') return ' =';
    return ' -';
  }

  function erow(e){
    var epsSurp = e.epsSurprisePct!=null?'<div style="font-size:10px;color:'+(e.epsSurprisePct>=0?'var(--green)':'var(--red)')+'">Surprise: '+(e.epsSurprisePct>=0?'+':'')+e.epsSurprisePct+'%</div>':'';
    var revSurp = e.revSurprisePct!=null?'<div style="font-size:10px;color:'+(e.revSurprisePct>=0?'var(--green)':'var(--red)')+'">Surprise: '+(e.revSurprisePct>=0?'+':'')+e.revSurprisePct+'%</div>':'';
    var when = e.hour==='amc'?'<span style="background:var(--pbg);color:var(--purple);padding:2px 6px;border-radius:4px;font-size:10px">After Close</span>':
               e.hour==='bmo'?'<span style="background:var(--gbg);color:var(--green);padding:2px 6px;border-radius:4px;font-size:10px">Before Open</span>':
               '<span style="color:var(--text3);font-size:10px">-</span>';
    var mcap = e.marketCap>0?'<div style="font-size:9px;color:var(--text3);margin-top:1px">MCap: $'+e.marketCap+'B</div>':'';
    return '<tr style="border-bottom:1px solid var(--border)">'+
      '<td style="padding:10px 12px;vertical-align:middle">'+
        '<div style="font-weight:500;font-family:JetBrains Mono,monospace;font-size:12px">'+e.symbol+'</div>'+
        (e.companyName?'<div style="font-size:10px;color:var(--text2);margin-top:1px">'+esc(e.companyName)+'</div>':'')+
        mcap+
        (e.inPortfolio?'<span class="badge b-own" style="margin-top:3px;display:inline-block">In Portfolio</span>':'')+
      '</td>'+
      '<td style="padding:10px 12px;font-size:11px;color:var(--accent2);font-family:JetBrains Mono,monospace">'+
        (e.date||'-')+
      '</td>'+
      '<td style="padding:10px 12px">'+when+'</td>'+
      '<td style="padding:10px 12px;font-size:11px;font-family:JetBrains Mono,monospace">'+
        '<div style="color:var(--text2)">Est: '+(e.epsEstimate!=null?'$'+f2(e.epsEstimate):'-')+'</div>'+
        (e.epsActual!=null?'<div style="'+verdictStyle(e.epsVerdict)+'">Act: $'+f2(e.epsActual)+verdictIcon(e.epsVerdict)+'</div>':'')+
        (e.epsVerdict?'<div style="'+verdictStyle(e.epsVerdict)+'font-size:10px">'+e.epsVerdict+'</div>':'')+
        epsSurp+
      '</td>'+
      '<td style="padding:10px 12px;font-size:11px;font-family:JetBrains Mono,monospace">'+
        '<div style="color:var(--text2)">Est: '+(e.revenueEstimate!=null?'$'+f2(e.revenueEstimate/1e9)+'B':'-')+'</div>'+
        (e.revenueActual!=null?'<div style="'+verdictStyle(e.revVerdict)+'">Act: $'+f2(e.revenueActual/1e9)+'B'+verdictIcon(e.revVerdict)+'</div>':'')+
        (e.revVerdict?'<div style="'+verdictStyle(e.revVerdict)+'font-size:10px">'+e.revVerdict+'</div>':'')+
        revSurp+
      '</td>'+
      '<td style="padding:10px 12px;font-size:11px;font-family:JetBrains Mono,monospace">'+
        (e.currentPrice!=null&&e.currentPrice>0?
          '<div style="font-weight:500">$'+f2(e.currentPrice)+'</div>'+
          (e.priceChange!=null?'<div style="color:'+(e.priceChange>=0?'var(--green)':'var(--red)')+'">'+
            (e.priceChange>=0?'+':'')+f2(e.priceChange)+' ('+f2(e.priceChangePct)+'%)</div>':'')
        :'<div style="color:var(--text3)">-</div>')+
      '</td>'+
    '</tr>';
  }

  // Search bar
  var searchId = 'earn-search-'+tab;
  var searchVal = (document.getElementById(searchId)||{}).value||'';

  // Filter by search
  var items = allItems.filter(function(e){
    if(!searchVal) return true;
    var s = searchVal.toLowerCase();
    return (e.symbol||'').toLowerCase().indexOf(s)>=0 ||
           (e.companyName||'').toLowerCase().indexOf(s)>=0;
  });

  document.getElementById('earn-c').innerHTML=
    '<div class="news-tabs" style="margin-bottom:12px">'+
      '<button class="news-tab '+(tab==='upcoming'?'active':'')+'" onclick="renderEarnings(&quot;upcoming&quot;)">Upcoming Earnings</button>'+
      '<button class="news-tab '+(tab==='past'?'active':'')+'" onclick="renderEarnings(&quot;past&quot;)">Past Earnings (90 days)</button>'+
    '</div>'+
    '<div class="filter-bar" style="margin-bottom:12px">'+
      '<input class="fi" id="'+searchId+'" placeholder="Search company or ticker..." oninput="renderEarnings(this.dataset.tab)" data-tab="'+tab+'" value="'+esc(searchVal)+'" style="width:220px">'+
      '<span style="font-size:11px;color:var(--text3)">'+items.length+' companies'+
        (allItems.filter(function(e){return e.inPortfolio;}).length?
          ' &middot; <span style="color:var(--accent2)">'+allItems.filter(function(e){return e.inPortfolio;}).length+' in your portfolio</span>':'')+
      '</span>'+
    '</div>'+
    (items.length?
      '<div style="overflow-x:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)">'+
        '<table style="width:100%;border-collapse:collapse;min-width:750px">'+
          '<thead><tr style="background:var(--bg3)">'+
            '<th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--text3);font-family:JetBrains Mono,monospace;text-transform:uppercase;white-space:nowrap">Company</th>'+
            '<th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--text3);font-family:JetBrains Mono,monospace;text-transform:uppercase;white-space:nowrap">Date</th>'+
            '<th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--text3);font-family:JetBrains Mono,monospace;text-transform:uppercase;white-space:nowrap">When</th>'+
            '<th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--text3);font-family:JetBrains Mono,monospace;text-transform:uppercase;white-space:nowrap">EPS</th>'+
            '<th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--text3);font-family:JetBrains Mono,monospace;text-transform:uppercase;white-space:nowrap">Revenue</th>'+
            '<th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--text3);font-family:JetBrains Mono,monospace;text-transform:uppercase;white-space:nowrap">Stock Price</th>'+
          '</tr></thead>'+
          '<tbody>'+items.map(erow).join('')+'</tbody>'+
        '</table></div>'
    :'<div style="color:var(--text3);font-size:12px;padding:30px;text-align:center">No earnings data found</div>');
}

function addWL(){var inp=document.getElementById('wl-inp');var t=inp.value.trim().toUpperCase();if(!t) return;if(S.extraWL.indexOf(t)<0) S.extraWL.push(t);S.removedWL=S.removedWL.filter(function(x){return x!==t;});saveWL();inp.value='';renderWatchlist();queueFetch([t]);fetchName(t);}
function removeWL(ticker){S.extraWL=S.extraWL.filter(function(t){return t!==ticker;});if(S.removedWL.indexOf(ticker)<0) S.removedWL.push(ticker);saveWL();renderWatchlist();}
function saveWL(){localStorage.setItem('extraWL',JSON.stringify(S.extraWL));localStorage.setItem('removedWL',JSON.stringify(S.removedWL));}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this) closeModal();});
function showTab(tab,btn){document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('active');});document.querySelectorAll('.ntab').forEach(function(t){t.classList.remove('active');});document.getElementById('sec-'+tab).classList.add('active');btn.classList.add('active');if(tab==='news') loadNews();if(tab==='earnings') loadEarnings();}
function showSug(tf,btn){document.querySelectorAll('.tftab').forEach(function(t){t.classList.remove('active');});btn.classList.add('active');renderSuggestions(tf);}
function setLoad(on){document.getElementById('ref-btn').classList.toggle('loading',on);document.getElementById('ref-ico').textContent=on?'...':'R';}
function renderAll(){renderOverview();renderPortfolio('isa',S.isa,'ISA','b-isa','pu');renderPortfolio('invest',S.invest,'Invest','b-inv','am');renderWatchlist();renderSuggestions(S.sugTF);renderEarnings('upcoming');}

var earningsLoaded=false;
function loadEarnings(){
  if(earningsLoaded && S.earnings && S.earnings.upcoming) {
    renderEarnings('upcoming');
    return;
  }
  document.getElementById('earn-c').innerHTML='<div class="ldg"><div class="sp"></div><p>Loading earnings...</p></div>';
  get('/api/earnings').then(function(earn){
    S.earnings=earn||{upcoming:[],past:[]};
    earningsLoaded=true;
    renderEarnings('upcoming');
  }).catch(function(){
    document.getElementById('earn-c').innerHTML='<div class="err">Failed to load earnings. Please try again.</div>';
  });
}

function refreshAll(){setLoad(true);S.indCache={};S.newsCache={};newsLoaded=false;earningsLoaded=false;sessionStorage.removeItem('indCache');sessionStorage.removeItem('newsCache');sessionStorage.removeItem('nameCache');fQ=[];Object.keys(NF).forEach(function(k){NC[k]=NF[k];});Promise.all([get('/api/summary').catch(function(){return null;}),get('/api/portfolio/isa').catch(function(){return{data:[]};})  ,get('/api/portfolio/invest').catch(function(){return{data:[]};})  ,get('/api/suggestions').catch(function(){return{};})  ]).then(function(res){S.summary=res[0];S.isa=(res[1].data)||[];S.invest=(res[2].data)||[];S.suggestions=res[3]||{};S.isa.concat(S.invest).forEach(function(h){owned[h.symbol]=1;});renderAll();setLoad(false);get('/api/watchlist').then(function(wlR){S.watchlist=(wlR.data)||[];renderWatchlist();}).catch(function(){});
var allSyms=[],allHoldings=[],seen={};S.isa.concat(S.invest).forEach(function(h){if(h.symbol&&!seen[h.symbol]){seen[h.symbol]=1;allSyms.push(h.symbol);allHoldings.push(h);}});var indSyms=allHoldings.map(function(h){return h.indSymbol||h.symbol;});queueFetch(allSyms,indSyms);allSyms.forEach(function(s){fetchName(s);});}).catch(function(e){console.error(e);setLoad(false);});}
setInterval(function(){Promise.all([get('/api/summary').catch(function(){return null;}),get('/api/portfolio/isa').catch(function(){return{data:[]};})  ,get('/api/portfolio/invest').catch(function(){return{data:[]};})  ]).then(function(res){if(res[0]) S.summary=res[0];if(res[1]&&res[1].data) S.isa=res[1].data;if(res[2]&&res[2].data) S.invest=res[2].data;renderAll();var el=document.getElementById('last-updated');if(el) el.textContent='Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}).catch(function(){});},120000);
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});
refreshAll();
</script>
